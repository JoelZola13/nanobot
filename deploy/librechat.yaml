version: 1.3.3
cache: true

registration:
  allowedDomains: []

mcpServers:
  postiz:
    type: stdio
    command: node
    args:
      - /app/scripts/postiz-mcp.js
    env:
      POSTIZ_API_KEY: "b0cdba1a151dba58aaa9055368a9e8a96b98e857a6e78513d848a6de6d77a9ea"
      POSTIZ_API_URL: "http://host.docker.internal:4007/api"
    timeout: 30000
    initTimeout: 10000

speech:
  tts:
    openai:
      apiKey: "nanobot"
      url: "http://nanobot-api:18790/v1/audio/speech"
      model: "tts-1"
      voices: ["alloy", "echo", "fable", "onyx", "nova", "shimmer"]
  stt:
    openai:
      apiKey: "nanobot"
      url: "http://nanobot-api:18790/v1/audio/transcriptions"
      model: "whisper-1"

endpoints:
  custom:
    - name: "Street Bot"
      apiKey: "nanobot"
      baseURL: "http://nanobot-api:18790/v1"
      models:
        default: ["agent/auto", "agent/ceo", "agent/communication_manager", "agent/content_manager", "agent/development_manager", "agent/finance_manager", "agent/grant_manager", "agent/research_manager", "agent/scraping_manager", "openai-codex/gpt-5.4", "gpt-5.4", "gpt-5.1", "gpt-5"]
        fetch: false
      titleConvo: true
      titleModel: "openai-codex/gpt-5.4"
      modelDisplayLabel: "Street Bot"
      dropParams:
        - stop
        - user
        - frequency_penalty
        - presence_penalty
        - top_p

modelSpecs:
  enforce: false
  prioritize: true
  list:
    # ─── Executive Team ───────────────────────────────────────────────
    - name: "agent/ceo"
      label: "CEO"
      description: "Central coordinator and entry point. Delegates tasks to the right team manager and handles cross-team coordination."
      iconURL: "https://cdn.jsdelivr.net/npm/@mdi/svg@7.4.47/svg/account-tie.svg"
      default: true
      preset:
        endpoint: "Street Bot"
        model: "agent/ceo"
      spec:
        name: "agent/ceo"
        preset:
          endpoint: "Street Bot"
          model: "agent/ceo"

    - name: "agent/executive_memory"
      label: "Executive Memory"
      description: "Apex memory node — aggregates insights from all departments into organizational knowledge."
