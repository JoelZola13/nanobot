services:
  api:
    container_name: nanobot-librechat
    build:
      context: .
      dockerfile: Dockerfile
    image: streetvoices/librechat:local
    ports: !override []
    depends_on: !override
      - mongodb
    volumes:
      - type: bind
        source: ./librechat.yaml
        target: /app/librechat.yaml
      - type: bind
        source: ./scripts
        target: /app/scripts

  nginx:
    container_name: nanobot-nginx
    image: nginx:alpine
    ports:
      - "3180:3180"
    volumes:
      - type: bind
        source: ./nginx-unified.conf
        target: /etc/nginx/conf.d/default.conf
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - api
      - nanobot-api
      - paperclip
    restart: always

  mongodb:
    container_name: nanobot-mongodb
    ports:
      - "27018:27017"

  meilisearch:
    container_name: nanobot-meilisearch

  vectordb:
    container_name: nanobot-vectordb

  # ── RAG API (disabled — needs OPENAI_API_KEY for embeddings) ─────
  # To re-enable: remove the profiles block below, add OPENAI_API_KEY
  # to LibreChat/.env, then run: docker compose up -d rag_api
  rag_api:
    container_name: nanobot-rag-api
    profiles:
      - rag

  # ── Nanobot API Server (Python/FastAPI) ──────────────────────────
  nanobot-api:
    container_name: nanobot-api
    build:
      context: ..
      dockerfile: Dockerfile
    entrypoint: []
    command: ["python", "-m", "uvicorn", "nanobot.api_server:app", "--host", "0.0.0.0", "--port", "18790"]
    ports:
      - "18790:18790"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - type: bind
        source: ${NANOBOT_HOME:-~/.nanobot}
        target: /root/.nanobot
      - type: bind
        source: ../LibreChat/client/public
        target: /app/LibreChat/client/public
    environment:
      - OAUTH_CLI_KIT_TOKEN_PATH=/root/.nanobot/codex-token.json
    env_file:
      - ../.env.nanobot
    restart: always

  # ── WhatsApp Bridge (Node.js/Baileys) ────────────────────────────
  whatsapp-bridge:
    container_name: nanobot-whatsapp
    build:
      context: ..
      dockerfile: Dockerfile
    entrypoint: []
    command: ["node", "/app/bridge/dist/index.js"]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - type: bind
        source: ${NANOBOT_HOME:-~/.nanobot}/whatsapp-auth
        target: /root/.nanobot/whatsapp-auth
      - type: bind
        source: ${NANOBOT_HOME:-~/.nanobot}/config.json
        target: /root/.nanobot/config.json
    env_file:
      - ../.env.nanobot
    depends_on:
      - nanobot-api
    restart: always

  # ── Paperclip (Project Management) ──────────────────────────────
  paperclip:
    container_name: nanobot-paperclip
    build:
      context: ..
      dockerfile: Dockerfile.paperclip
    ports:
      - "3100:3100"
    environment:
      - PAPERCLIP_AGENT_JWT_SECRET=${PAPERCLIP_JWT_SECRET:-nanobot-paperclip-secret-change-me}
      - DATABASE_URL=postgresql://myuser:mypassword@vectordb:5432/paperclip
    volumes:
      - type: bind
        source: ../paperclip-docker-config.json
        target: /home/paperclip/.paperclip/instances/default/config.json
    depends_on:
      - vectordb
    restart: always

  # ── Paperclip Relay (Heartbeat/Dispatch) ────────────────────────
  paperclip-relay:
    container_name: nanobot-relay
    build:
      context: ..
      dockerfile: Dockerfile
    entrypoint: []
    command: ["tsx", "/app/bridge/src/paperclip-relay.ts"]
    ports:
      - "3050:3050"
    environment:
      - NANOBOT_API_URL=http://nanobot-api:18790
      - PAPERCLIP_API_URL=http://paperclip:3100/api
    depends_on:
      - nanobot-api
      - paperclip
    restart: always
