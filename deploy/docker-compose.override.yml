services:
  api:
    container_name: nanobot-librechat
    build:
      context: .
      dockerfile: Dockerfile
    image: streetvoices/librechat:local
    ports: !override []
    depends_on: !override
      - mongodb
    volumes:
      - type: bind
        source: ./librechat.yaml
        target: /app/librechat.yaml
      - type: bind
        source: ./scripts
        target: /app/scripts
      - type: bind
        source: ../deploy/custom-ui/custom-index.html
        target: /app/client/dist/index.html
      - type: bind
        source: ../deploy/custom-ui/unified-nav.js
        target: /app/client/dist/unified-nav.js
      - type: bind
        source: ../deploy/custom-ui/accounting.js
        target: /app/client/dist/accounting.js
      - type: bind
        source: ../deploy/custom-ui/images/sidebar-icons/accounting.svg
        target: /app/client/public/images/sidebar-icons/accounting.svg

  nginx:
    container_name: nanobot-nginx
    image: nginx:alpine
    ports:
      - "3180:3180"
    volumes:
      - type: bind
        source: ../deploy/nginx-unified.conf
        target: /etc/nginx/conf.d/default.conf
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - api
      - nanobot-api
      - paperclip
      - sv-social
      - casdoor
      - gnucash
    restart: always

  mongodb:
    container_name: nanobot-mongodb
    ports:
      - "27018:27017"

  meilisearch:
    container_name: nanobot-meilisearch

  vectordb:
    container_name: nanobot-vectordb
    environment:
      - POSTGRES_DBS=paperclip,casdoor
    volumes:
      - type: bind
        source: ../deploy/init-extra-dbs.sh
        target: /docker-entrypoint-initdb.d/init-extra-dbs.sh

  # ── RAG API (disabled — needs OPENAI_API_KEY for embeddings) ─────
  # To re-enable: remove the profiles block below, add OPENAI_API_KEY
  # to LibreChat/.env, then run: docker compose up -d rag_api
  rag_api:
    container_name: nanobot-rag-api
    profiles:
      - rag

  # ── Nanobot API Server (Python/FastAPI) ──────────────────────────
  nanobot-api:
    container_name: nanobot-api
    build:
      context: ..
      dockerfile: Dockerfile
    entrypoint: []
    command: ["python", "-m", "uvicorn", "nanobot.api_server:app", "--host", "0.0.0.0", "--port", "18790"]
    ports:
      - "18790:18790"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - type: bind
        source: ${NANOBOT_HOME:-~/.nanobot}
        target: /root/.nanobot
      - type: bind
        source: ../LibreChat/client/public
        target: /app/LibreChat/client/public
    environment:
      - OAUTH_CLI_KIT_TOKEN_PATH=/root/.nanobot/codex-token.json
    env_file:
      - ../.env.nanobot
    restart: always

  # ── WhatsApp Bridge (Node.js/Baileys) ────────────────────────────
  whatsapp-bridge:
    container_name: nanobot-whatsapp
    build:
      context: ..
      dockerfile: Dockerfile
    entrypoint: []
    command: ["node", "/app/bridge/dist/index.js"]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - type: bind
        source: ${NANOBOT_HOME:-~/.nanobot}/whatsapp-auth
        target: /root/.nanobot/whatsapp-auth
      - type: bind
        source: ${NANOBOT_HOME:-~/.nanobot}/config.json
        target: /root/.nanobot/config.json
    env_file:
      - ../.env.nanobot
    depends_on:
      - nanobot-api
    restart: always

  # ── Paperclip (Project Management) ──────────────────────────────
  paperclip:
    container_name: nanobot-paperclip
    build:
      context: ..
      dockerfile: Dockerfile.paperclip
    ports:
      - "3100:3100"
    environment:
      - PAPERCLIP_AGENT_JWT_SECRET=${PAPERCLIP_JWT_SECRET:-nanobot-paperclip-secret-change-me}
      - DATABASE_URL=postgresql://myuser:mypassword@vectordb:5432/paperclip
    volumes:
      - type: bind
        source: ../paperclip-docker-config.json
        target: /home/paperclip/.paperclip/instances/default/config.json
    depends_on:
      - vectordb
    restart: always

  # ── Paperclip Relay (Heartbeat/Dispatch) ────────────────────────
  paperclip-relay:
    container_name: nanobot-relay
    build:
      context: ..
      dockerfile: Dockerfile
    entrypoint: []
    command: ["tsx", "/app/bridge/src/paperclip-relay.ts"]
    ports:
      - "3050:3050"
    environment:
      - NANOBOT_API_URL=http://nanobot-api:18790
      - PAPERCLIP_API_URL=http://paperclip:3100/api
    depends_on:
      - nanobot-api
      - paperclip
    restart: always

  # ── Casdoor (SSO for Social App) ─────────────────────────────
  casdoor:
    container_name: nanobot-casdoor
    image: casbin/casdoor
    ports:
      - "8380:8000"
    environment:
      RUNNING_IN_DOCKER: "true"
    volumes:
      - type: bind
        source: ../LobeHub/casdoor/init_data.json
        target: /init_data.json
      - type: bind
        source: ../deploy/casdoor-app.conf
        target: /conf/app.conf
    depends_on:
      casdoor-postgres:
        condition: service_healthy
    restart: always

  casdoor-postgres:
    container_name: nanobot-casdoor-postgres
    image: postgres:17-alpine
    environment:
      - POSTGRES_USER=lobehub
      - POSTGRES_PASSWORD=lobehub_password
      - POSTGRES_DB=casdoor
    volumes:
      - casdoor-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: pg_isready -U lobehub -d casdoor
      interval: 10s
      timeout: 3s
      retries: 3
    restart: always

  # ── SV Social (Street Voices Social Pages) ─────────────────────
  sv-social:
    container_name: nanobot-social
    build:
      context: ../social
      dockerfile: Dockerfile
    ports:
      - "3182:3182"
      - "3183:3183"
    environment:
      - PORT=3182
      - WS_PORT=3183
      - NODE_ENV=production
      - DATABASE_URL=postgresql://social:social_password@social-postgres:5432/social
      - NEXTAUTH_URL=http://localhost:3180/social/api/auth
      - AUTH_SECRET=street-voices-social-secret-2026
      - AUTH_CASDOOR_ISSUER=http://localhost:8380
      - AUTH_CASDOOR_ID=social-app
      - AUTH_CASDOOR_SECRET=social-casdoor-secret-2026
      - NANOBOT_API_URL=http://nanobot-api:18790/v1
      - NANOBOT_API_KEY=nanobot
    depends_on:
      social-postgres:
        condition: service_healthy
      casdoor:
        condition: service_started
    restart: always

  social-postgres:
    container_name: nanobot-social-postgres
    image: postgres:17-alpine
    environment:
      - POSTGRES_USER=social
      - POSTGRES_PASSWORD=social_password
      - POSTGRES_DB=social
    volumes:
      - social-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: pg_isready -U social -d social
      interval: 10s
      timeout: 3s
      retries: 3
    restart: always

  # ── Postiz (Social Media Scheduling) ───────────────────────────
  postiz:
    container_name: nanobot-postiz
    image: ghcr.io/gitroomhq/postiz-app:latest
    environment:
      - MAIN_URL=http://localhost:4007
      - FRONTEND_URL=http://localhost:4007
      - NEXT_PUBLIC_BACKEND_URL=http://localhost:4007/api
      - JWT_SECRET=${POSTIZ_JWT_SECRET:-4CeokNgeR0BZcSNNffNU1hzm2xY3JIfiOySJaRRuVsEnRvnCJbfyI83s5Gwv05pZ}
      - DATABASE_URL=postgresql://postiz-user:postiz_password@postiz-postgres:5432/postiz-db
      - REDIS_URL=redis://postiz-redis:6379
      - BACKEND_INTERNAL_URL=http://localhost:3000
      - IS_GENERAL=true
      - DISABLE_REGISTRATION=false
      - RUN_CRON=true
      - STORAGE_PROVIDER=local
      - UPLOAD_DIRECTORY=/uploads
      - NEXT_PUBLIC_UPLOAD_DIRECTORY=/uploads
      - NX_ADD_PLUGINS=false
      - API_LIMIT=30
      - FEE_AMOUNT=0.05
      - OPENAI_API_KEY=
      - FACEBOOK_APP_ID=${POSTIZ_FACEBOOK_APP_ID:-}
      - FACEBOOK_APP_SECRET=${POSTIZ_FACEBOOK_APP_SECRET:-}
      - X_API_KEY=${POSTIZ_X_API_KEY:-}
      - X_API_SECRET=${POSTIZ_X_API_SECRET:-}
      - LINKEDIN_CLIENT_ID=
      - LINKEDIN_CLIENT_SECRET=
      - REDDIT_CLIENT_ID=
      - REDDIT_CLIENT_SECRET=
      - GITHUB_CLIENT_ID=
      - GITHUB_CLIENT_SECRET=
      - YOUTUBE_CLIENT_ID=
      - YOUTUBE_CLIENT_SECRET=
      - TIKTOK_CLIENT_ID=
      - TIKTOK_CLIENT_SECRET=
      - PINTEREST_CLIENT_ID=
      - PINTEREST_CLIENT_SECRET=
      - DRIBBBLE_CLIENT_ID=
      - DRIBBBLE_CLIENT_SECRET=
      - DISCORD_CLIENT_ID=
      - DISCORD_CLIENT_SECRET=
      - DISCORD_BOT_TOKEN_ID=
      - THREADS_APP_ID=
      - THREADS_APP_SECRET=
      - SLACK_ID=
      - SLACK_SECRET=
      - SLACK_SIGNING_SECRET=
      - BEEHIIVE_API_KEY=
      - BEEHIIVE_PUBLICATION_ID=
      - NEXT_PUBLIC_DISCORD_SUPPORT=
      - NEXT_PUBLIC_POLOTNO=
      - STRIPE_PUBLISHABLE_KEY=
      - STRIPE_SECRET_KEY=
      - STRIPE_SIGNING_KEY=
      - STRIPE_SIGNING_KEY_CONNECT=
    volumes:
      - postiz-config:/config/
      - postiz-uploads:/uploads/
    ports:
      - "4007:5000"
    depends_on:
      postiz-postgres:
        condition: service_healthy
      postiz-redis:
        condition: service_healthy
    restart: always

  postiz-postgres:
    container_name: nanobot-postiz-postgres
    image: postgres:17-alpine
    environment:
      - POSTGRES_USER=postiz-user
      - POSTGRES_PASSWORD=postiz_password
      - POSTGRES_DB=postiz-db
    volumes:
      - postiz-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: pg_isready -U postiz-user -d postiz-db
      interval: 10s
      timeout: 3s
      retries: 3
    restart: always

  postiz-redis:
    container_name: nanobot-postiz-redis
    image: redis:7.2
    healthcheck:
      test: redis-cli ping
      interval: 10s
      timeout: 3s
      retries: 3
    volumes:
      - postiz-redis-data:/data
    restart: always

  # ── GnuCash (Accounting via noVNC) ──────────────────────────────
  gnucash:
    container_name: nanobot-gnucash
    build:
      context: ../deploy/gnucash
      dockerfile: Dockerfile
    ports:
      - "6080:6080"
    volumes:
      - gnucash-data:/home/gnucash
    restart: always

volumes:
  casdoor-postgres-data:
  social-postgres-data:
  postiz-postgres-data:
  postiz-redis-data:
  postiz-config:
  postiz-uploads:
  gnucash-data:
