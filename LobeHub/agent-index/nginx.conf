server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;

    # CORS headers for LobeHub
    add_header Access-Control-Allow-Origin *;
    add_header Access-Control-Allow-Methods 'GET, POST, OPTIONS';
    add_header Access-Control-Allow-Headers 'Content-Type, Authorization';

    # Prevent caching of SVG avatars (LobeHub strips query-param cache-busters)
    location /avatars/ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
        add_header Access-Control-Allow-Origin *;
        types {
            image/svg+xml svg;
        }
    }

    # Path-based cache bust: /a/ serves same avatars at a fresh URL path
    location /a/ {
        alias /usr/share/nginx/html/avatars/;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
        add_header Access-Control-Allow-Origin *;
        types {
            image/svg+xml svg;
        }
    }

    # ─── MarketSDK stub endpoints (/api/v1/plugins/*) ─────────────
    # LobeHub's MarketSDK prepends /api/ to all v1 requests.
    # Return empty/valid responses so the Discover Home tab doesn't crash.

    # Plugin list (the main call that was failing)
    location ~ ^/api/v1/plugins$ {
        default_type application/json;
        return 200 '{"items":[],"currentPage":1,"totalCount":0,"totalPages":0}';
    }

    location = /api/v1/plugins/categories {
        default_type application/json;
        return 200 '[]';
    }

    location = /api/v1/plugins/identifiers {
        default_type application/json;
        return 200 '[]';
    }

    location ~ ^/api/v1/plugins/report/ {
        default_type application/json;
        return 200 '{"success":true}';
    }

    location ~ ^/api/v1/plugins/([^/]+)/manifest {
        default_type application/json;
        return 404 '{"error":"not found"}';
    }

    location ~ ^/api/v1/plugins/([^/]+)$ {
        default_type application/json;
        return 404 '{"error":"not found"}';
    }

    # Client registration
    location = /api/v1/clients/register {
        default_type application/json;
        return 200 '{"client_id":"local","client_secret":"local"}';
    }

    # Discovery documents
    location = /.well-known/discovery {
        default_type application/json;
        return 200 '{"version":"1.0","endpoints":{"plugins":"/api/v1/plugins"}}';
    }

    location = /.well-known/openid-configuration {
        default_type application/json;
        return 200 '{"issuer":"http://localhost:8381"}';
    }

    # OAuth stub (MarketSDK may try to get tokens)
    location /oauth/ {
        default_type application/json;
        return 200 '{"access_token":"local","token_type":"bearer","expires_in":86400}';
    }

    location / {
        try_files $uri $uri/ =404;
        types {
            application/json json;
            image/svg+xml svg;
        }
    }
}
