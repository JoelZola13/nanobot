agents:
  - name: research_manager
    role: lead
    description: "Coordinates research operations, prioritizes requests, synthesizes findings, and delivers intelligence briefs across all research domains."
    model: openai-codex/gpt-5.4
    tools: [web_search, web_fetch, file_read, file_write, news_search]
    handoffs:
      - media_platform_researcher
      - media_program_researcher
      - street_bot_researcher
      - research_memory
      - ceo
    system_prompt: research_manager.md
    max_iterations: 25

  - name: media_platform_researcher
    role: member
    description: "Analyzes social media platforms, content distribution networks, algorithm changes, and digital media ecosystems."
    model: openai-codex/gpt-5.4
    tools: [web_search, web_fetch, file_read, file_write, news_search]
    handoffs: [research_manager]
    system_prompt: media_platform_researcher.md
    max_iterations: 20

  - name: media_program_researcher
    role: member
    description: "Researches media programs, grants, fellowships, residencies, and institutional opportunities in media and arts."
    model: openai-codex/gpt-5.4
    tools: [web_search, web_fetch, file_read, file_write, academic_search, news_search]
    handoffs: [research_manager]
    system_prompt: media_program_researcher.md
    max_iterations: 20

  - name: street_bot_researcher
    role: member
    description: "Street-level research specialist gathering hyperlocal intelligence, community data, and urban environment information for Street Bot Pro."
    model: openai-codex/gpt-5.4
    tools: [web_search, web_fetch, file_read, file_write, news_search]
    handoffs: [research_manager, scraping_manager]
    system_prompt: street_bot_researcher.md
    max_iterations: 20

  - name: research_memory
    role: member
    description: "Background memory layer indexing all research activity, tracking source reliability, and surfacing prior findings on demand."
    model: openai-codex/gpt-5.4
    tools: [file_read, file_write]
    handoffs: [research_manager]
    system_prompt: research_memory.md
    max_iterations: 10
