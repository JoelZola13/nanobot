agents:
  - name: scraping_manager
    role: lead
    description: "Coordinates web scraping operations, evaluates extraction requests, plans approaches, and ensures ethical scraping practices."
    model: openai-codex/gpt-5.1-codex
    tools: [web_search, web_fetch, web_scrape, file_read, file_write]
    handoffs:
      - scraping_agent
      - scraper_memory
      - ceo
    system_prompt: scraping_manager.md
    max_iterations: 20

  - name: scraping_agent
    role: member
    description: "Executes web scraping tasks, data extraction, site analysis, and delivers structured datasets."
    model: openai-codex/gpt-5.1-codex
    tools: [web_search, web_fetch, web_scrape, html_parser, data_extractor, file_read, file_write, "mcp_playwright_*"]
    handoffs: [scraping_manager]
    system_prompt: scraping_agent.md
    max_iterations: 25

  - name: scraper_memory
    role: member
    description: "Background memory layer tracking site structures, extraction patterns, scraping job history, and data source registries."
    model: openai-codex/gpt-5.1-codex
    tools: [file_read, file_write]
    handoffs: [scraping_manager]
    system_prompt: scraper_memory.md
    max_iterations: 10
