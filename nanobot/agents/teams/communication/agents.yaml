agents:
  - name: communication_manager
    role: lead
    description: "Coordinates all cross-channel communication. Routes messages, manages channel priorities, and ensures consistent messaging."
    model: openai-codex/gpt-5.4
    tools: [web_search, file_read, file_write]
    handoffs:
      - email_agent
      - slack_agent
      - whatsapp_agent
      - calendar_agent
      - ceo
    system_prompt: communication_manager.md
    max_iterations: 20

  - name: email_agent
    role: member
    description: "Manages email communications via Gmail. Drafts, sends, reads, and organizes email."
    model: openai-codex/gpt-5.4
    tools: [web_search, file_read, email_send, email_read]
    handoffs: [communication_manager]
    system_prompt: email_agent.md
    max_iterations: 15

  - name: slack_agent
    role: member
    description: "Manages Slack workspace communications. Monitors channels, sends messages, and handles notifications."
    model: openai-codex/gpt-5.4
    tools: [web_search, file_read]
    handoffs: [communication_manager]
    system_prompt: slack_agent.md
    max_iterations: 15

  - name: whatsapp_agent
    role: member
    description: "Manages WhatsApp messaging. Handles personal and group conversations."
    model: openai-codex/gpt-5.4
    tools: [file_read]
    handoffs: [communication_manager]
    system_prompt: whatsapp_agent.md
    max_iterations: 15

  - name: calendar_agent
    role: member
    description: "Manages scheduling, availability, meetings, and deadline tracking across all calendars."
    model: openai-codex/gpt-5.4
    tools: [web_search, file_read, "mcp_google-calendar_*"]
    handoffs: [communication_manager]
    system_prompt: calendar_agent.md
    max_iterations: 15

  - name: communication_memory
    role: member
    description: "Background worker capturing all conversation data, contact patterns, and communication history."
    model: openai-codex/gpt-5.4
    tools: [file_read, file_write]
    handoffs: [communication_manager]
    system_prompt: communication_memory.md
    max_iterations: 10
