agents:
  - name: grant_manager
    role: lead
    description: "Oversees the full grant lifecycle — opportunity identification, team coordination, submission management, and funder relations."
    model: openai-codex/gpt-5.1-codex
    tools: [web_search, web_fetch, file_read, file_write, grants_database, "mcp_google-calendar_*", "mcp_playwright_*"]
    handoffs:
      - grant_writer
      - budget_manager
      - project_manager
      - grant_memory
      - ceo
    system_prompt: grant_manager.md
    max_iterations: 50

  - name: grant_writer
    role: member
    description: "Crafts compelling grant narratives, proposals, and supporting documents tailored to funder requirements and review criteria."
    model: openai-codex/gpt-5.1-codex
    tools: [web_search, web_fetch, file_read, file_write, grants_database, document_editor]
    handoffs: [grant_manager]
    system_prompt: grant_writer.md
    max_iterations: 20

  - name: budget_manager
    role: member
    description: "Builds detailed grant budgets, tracks expenditures against awards, and prepares financial reports for funders."
    model: openai-codex/gpt-5.1-codex
    tools: [file_read, file_write, spreadsheet_read, spreadsheet_write]
    handoffs: [grant_manager]
    system_prompt: budget_manager.md
    max_iterations: 15

  - name: project_manager
    role: member
    description: "Creates project plans, tracks milestones and deliverables, and generates progress reports for grant-funded work."
    model: openai-codex/gpt-5.1-codex
    tools: [file_read, file_write, "mcp_google-calendar_*", spreadsheet_read, spreadsheet_write]
    handoffs: [grant_manager]
    system_prompt: project_manager.md
    max_iterations: 15

  - name: grant_memory
    role: member
    description: "Knowledge base for the Grant Writing Team — stores funder profiles, past proposals, boilerplate, pipeline status, and surfaces historical insights."
    model: openai-codex/gpt-5.1-codex
    tools: [web_search, web_fetch, file_read, file_write, grants_database]
    handoffs: [grant_manager]
    system_prompt: grant_memory.md
    max_iterations: 10
