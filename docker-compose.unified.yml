# ═══════════════════════════════════════════════════════════════════════════
# Street Voices — Unified Multi-Agent Platform
# ═══════════════════════════════════════════════════════════════════════════
#
# Usage:  docker compose -f docker-compose.unified.yml up -d
#
# Services:
#   Chat       → http://localhost:3180  (LibreChat — main interface)
#   Marketplace→ http://localhost:3181  (LobeHub — agent marketplace)
#   Social     → http://localhost:3182  (SV Social — messaging & presence)
#   Auth       → http://localhost:8380  (Casdoor — SSO)
#   Nanobot API→ http://localhost:18790 (runs via PM2, not in Docker)
#
# ═══════════════════════════════════════════════════════════════════════════

services:

  # ─── Shared Infrastructure ────────────────────────────────────────────

  postgresql:
    image: pgvector/pgvector:pg17
    container_name: sv-postgresql
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: lobehub
      POSTGRES_USER: lobehub
      POSTGRES_PASSWORD: lobehub_password
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./LobeHub/casdoor/init-db.sh:/docker-entrypoint-initdb.d/10-init-casdoor-db.sh
      - ./social/prisma/init-social-db.sh:/docker-entrypoint-initdb.d/20-init-social-db.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lobehub"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - streetvoices

  casdoor:
    image: casbin/casdoor
    container_name: sv-casdoor
    ports:
      - "8380:8000"
    environment:
      RUNNING_IN_DOCKER: "true"
    volumes:
      - ./LobeHub/casdoor/init_data.json:/init_data.json
      - ./LobeHub/casdoor/app.conf:/conf/app.conf
    depends_on:
      postgresql:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - streetvoices

  redis:
    image: redis:7-alpine
    container_name: sv-redis
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - streetvoices

  rustfs:
    image: chrislusf/seaweedfs
    container_name: sv-rustfs
    ports:
      - "8333:8333"
    command: 'server -s3 -dir=/data'
    volumes:
      - seaweedfs_data:/data
    restart: unless-stopped
    networks:
      - streetvoices

  # ─── LibreChat (Main Chat Interface — port 3180) ──────────────────────

  librechat:
    image: ghcr.io/danny-avila/librechat-dev:latest
    container_name: sv-librechat
    ports:
      - "3180:3180"
    depends_on:
      - librechat-mongodb
      - rag_api
      - casdoor
    restart: always
    extra_hosts:
      - "host.docker.internal:host-gateway"
      - "localhost:host-gateway"
    # Strip loopback entries so localhost resolves to host (needed for Casdoor SSO)
    entrypoint: >
      /bin/sh -c "cp /etc/hosts /tmp/h &&
      grep -v -e '^127\\.0\\.0\\.1' -e '^::1' /tmp/h > /etc/hosts &&
      exec npm run backend"
    environment:
      - HOST=0.0.0.0
      - PORT=3180
      - MONGO_URI=mongodb://librechat-mongodb:27017/LibreChat
      - MEILI_HOST=http://meilisearch:7700
      - RAG_PORT=8000
      - RAG_API_URL=http://rag_api:8000
    volumes:
      - type: bind
        source: ./LibreChat/.env
        target: /app/.env
      - type: bind
        source: ./LibreChat/librechat.yaml
        target: /app/librechat.yaml
      - type: bind
        source: ./deploy/custom-ui/custom-index.html
        target: /app/client/dist/index.html
      - type: bind
        source: ./LibreChat/client/public/automations.js
        target: /app/client/dist/automations.js
      - type: bind
        source: ./deploy/custom-ui/unified-nav.js
        target: /app/client/dist/unified-nav.js
      - type: bind
        source: ./LibreChat/client/public/mission-control.js
        target: /app/client/dist/mission-control.js
      - type: bind
        source: ./LibreChat/client/public/sv-template.js
        target: /app/client/dist/sv-template.js
      - type: bind
        source: ./LibreChat/client/public/sv-instagram-bg.jpg
        target: /app/client/dist/sv-instagram-bg.jpg
      - type: bind
        source: ./LibreChat/client/public/html2canvas.min.js
        target: /app/client/dist/html2canvas.min.js
      - type: bind
        source: ./LibreChat/client/public/fonts/CocogooseCompressed-Regular.ttf
        target: /app/client/dist/fonts/CocogooseCompressed-Regular.ttf
      - type: bind
        source: ./LibreChat/client/public/sv-platform.js
        target: /app/client/dist/sv-platform.js
      - type: bind
        source: ./deploy/custom-ui/accounting.js
        target: /app/client/dist/accounting.js
      - type: bind
        source: ./deploy/custom-ui/images/sidebar-icons/accounting.svg
        target: /app/client/public/images/sidebar-icons/accounting.svg
      - type: bind
        source: ./LibreChat/scripts
        target: /app/scripts
      - ./LibreChat/images:/app/client/public/images
      - ./LibreChat/uploads:/app/uploads
      - ./LibreChat/logs:/app/logs
    networks:
      - streetvoices

  librechat-mongodb:
    image: mongo:8.0.17
    container_name: sv-librechat-mongodb
    ports:
      - "27018:27017"
    restart: always
    volumes:
      - ./LibreChat/data-node:/data/db
    command: mongod --noauth
    networks:
      - streetvoices

  meilisearch:
    image: getmeili/meilisearch:v1.12.3
    container_name: sv-meilisearch
    restart: always
    environment:
      - MEILI_HOST=http://meilisearch:7700
      - MEILI_NO_ANALYTICS=true
      - MEILI_MASTER_KEY=DrhYf7zENyR6AlUCKmnz0eYASOQdl6zxH7s7MKFSfFCt
    volumes:
      - ./LibreChat/meili_data_v1.12:/meili_data
    networks:
      - streetvoices

  vectordb:
    image: pgvector/pgvector:0.8.0-pg15-trixie
    container_name: sv-vectordb
    environment:
      POSTGRES_DB: mydatabase
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword
    restart: always
    volumes:
      - vectordb_data:/var/lib/postgresql/data
    networks:
      - streetvoices

  rag_api:
    image: ghcr.io/danny-avila/librechat-rag-api-dev-lite:latest
    container_name: sv-rag-api
    environment:
      - DB_HOST=vectordb
      - RAG_PORT=8000
    restart: always
    depends_on:
      - vectordb
    env_file:
      - ./LibreChat/.env
    networks:
      - streetvoices

  # ─── LobeHub (Agent Marketplace — port 3181) ──────────────────────────

  lobehub:
    image: lobehub/lobe-chat-database
    container_name: sv-lobehub
    ports:
      - "3181:3210"
    env_file: ./LobeHub/.env
    user: root
    entrypoint: >
      /bin/sh -c "cp /etc/hosts /tmp/h &&
      grep -v -e '^127\\.0\\.0\\.1' -e '^::1' /tmp/h > /etc/hosts &&
      exec /bin/node /app/startServer.js"
    depends_on:
      postgresql:
        condition: service_healthy
      rustfs:
        condition: service_started
      casdoor:
        condition: service_started
    extra_hosts:
      - "localhost:host-gateway"
    restart: unless-stopped
    networks:
      - streetvoices

  agent-index:
    image: nginx:alpine
    container_name: sv-agent-index
    ports:
      - "8381:80"
    volumes:
      - ./LobeHub/agent-index:/usr/share/nginx/html:ro
      - ./LobeHub/agent-index/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
    networks:
      - streetvoices

  # ─── SV Social (Messaging & Presence — port 3182) ────────────────────

  social:
    build:
      context: ./social
      dockerfile: Dockerfile
    container_name: sv-social
    ports:
      - "3182:3182"
      - "3183:3183"
    environment:
      - PORT=3182
      - WS_PORT=3183
      - DATABASE_URL=postgresql://lobehub:lobehub_password@localhost:5433/social
      - AUTH_CASDOOR_ISSUER=http://localhost:8380
      - AUTH_CASDOOR_ID=social-app
      - AUTH_CASDOOR_SECRET=social-casdoor-secret-2026
      - AUTH_SECRET=street-voices-social-secret-2026
      - NEXTAUTH_URL=http://localhost:3180/social/api/auth
      - NANOBOT_API_URL=http://host.docker.internal:18790/v1
      - NANOBOT_API_KEY=nanobot
    depends_on:
      postgresql:
        condition: service_healthy
      casdoor:
        condition: service_started
    extra_hosts:
      - "host.docker.internal:host-gateway"
      - "localhost:host-gateway"
    # Strip loopback entries so localhost resolves to host (needed for Casdoor SSO)
    entrypoint: >
      /bin/sh -c "cp /etc/hosts /tmp/h &&
      grep -v -e '^127\\.0\\.0\\.1' -e '^::1' /tmp/h > /etc/hosts &&
      exec node server.mjs"
    restart: unless-stopped
    networks:
      - streetvoices
      - lobehub_streetvoices

volumes:
  pgdata:
  seaweedfs_data:
  redis_data:
  vectordb_data:

networks:
  streetvoices:
    driver: bridge
  lobehub_streetvoices:
    external: true
