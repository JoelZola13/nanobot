<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="grad_grant_manager" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#14B8A6"/>
      <stop offset="100%" stop-color="#134e4a"/>
    </linearGradient>
    <radialGradient id="bg_grant_manager" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#14B8A6" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#134e4a" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow_grant_manager" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#134e4a" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Outer ring decoration -->
  <circle cx="60" cy="60" r="49" fill="none" stroke="#14B8A6" stroke-width="2" opacity="0.4"/>

  <!-- Main circle with gradient -->
  <circle cx="60" cy="60" r="46" fill="url(#grad_grant_manager)" filter="url(#shadow_grant_manager)"/>

  <!-- Inner highlight -->
  <circle cx="60" cy="60" r="46" fill="url(#bg_grant_manager)"/>

  <!-- Role glyph -->
  <g opacity="0.9">
    <polygon points="52,42 55,36 60,39 65,36 68,42"
             fill="#99f6e4" stroke="none"/>
    <line x1="51" y1="42" x2="69" y2="42" stroke="#99f6e4" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- Initials -->
  <text x="60" y="68"
        text-anchor="middle" dominant-baseline="middle"
        font-family="'SF Pro Display', 'Inter', -apple-system, BlinkMacSystemFont, sans-serif"
        font-size="28" font-weight="700"
        fill="#ffffff" letter-spacing="1.5">
    GM
  </text>
</svg>