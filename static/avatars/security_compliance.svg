<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="grad_security_compliance" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4AF37"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <radialGradient id="bg_security_compliance" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#D4AF37" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#1a1a2e" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow_security_compliance" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#1a1a2e" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Outer ring decoration -->
  <circle cx="60" cy="60" r="48" fill="none" stroke="#D4AF37" stroke-width="1" opacity="0.2"/>

  <!-- Main circle with gradient -->
  <circle cx="60" cy="60" r="46" fill="url(#grad_security_compliance)" filter="url(#shadow_security_compliance)"/>

  <!-- Inner highlight -->
  <circle cx="60" cy="60" r="46" fill="url(#bg_security_compliance)"/>

  <!-- Role glyph -->
  

  <!-- Initials -->
  <text x="60" y="64"
        text-anchor="middle" dominant-baseline="middle"
        font-family="'SF Pro Display', 'Inter', -apple-system, BlinkMacSystemFont, sans-serif"
        font-size="26" font-weight="500"
        fill="#ffffff" letter-spacing="1.5">
    SC
  </text>
</svg>