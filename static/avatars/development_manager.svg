<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="grad_development_manager" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#3b0764"/>
    </linearGradient>
    <radialGradient id="bg_development_manager" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#3b0764" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow_development_manager" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#3b0764" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Outer ring decoration -->
  <circle cx="60" cy="60" r="49" fill="none" stroke="#8B5CF6" stroke-width="2" opacity="0.4"/>

  <!-- Main circle with gradient -->
  <circle cx="60" cy="60" r="46" fill="url(#grad_development_manager)" filter="url(#shadow_development_manager)"/>

  <!-- Inner highlight -->
  <circle cx="60" cy="60" r="46" fill="url(#bg_development_manager)"/>

  <!-- Role glyph -->
  <g opacity="0.9">
    <polygon points="52,42 55,36 60,39 65,36 68,42"
             fill="#ddd6fe" stroke="none"/>
    <line x1="51" y1="42" x2="69" y2="42" stroke="#ddd6fe" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- Initials -->
  <text x="60" y="68"
        text-anchor="middle" dominant-baseline="middle"
        font-family="'SF Pro Display', 'Inter', -apple-system, BlinkMacSystemFont, sans-serif"
        font-size="28" font-weight="700"
        fill="#ffffff" letter-spacing="1.5">
    DM
  </text>
</svg>